name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish (e.g. v0.1.0). Leave empty to only run on tag push."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "tag must start with v (got $TAG)" >&2; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p winetop --target ${{ matrix.target }}
          else
            cargo build --release -p winetop --target ${{ matrix.target }}
          fi

      - name: Package tarball
        run: |
          VER="${{ needs.meta.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NAME="winetop-v${VER}-${TARGET}"
          mkdir -p dist-out
          cp "target/${TARGET}/release/winetop" dist-out/winetop
          tar -C dist-out -cJf "${NAME}.tar.xz" winetop
          sha256sum "${NAME}.tar.xz" | tee "${NAME}.tar.xz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: |
            winetop-v*.tar.xz
            winetop-v*.tar.xz.sha256

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    outputs:
      sha_amd64: ${{ steps.sums.outputs.sha_amd64 }}
      sha_arm64: ${{ steps.sums.outputs.sha_arm64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        id: sums
        run: |
          set -euo pipefail
          VER="${{ needs.meta.outputs.version }}"
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.sha256' \) -exec cp -v {} release-assets/ \;
          cd release-assets
          sha256sum *.tar.xz | tee SHA256SUMS

          AMD=$(sha256sum "winetop-v${VER}-x86_64-unknown-linux-gnu.tar.xz" | awk '{print $1}')
          ARM=$(sha256sum "winetop-v${VER}-aarch64-unknown-linux-gnu.tar.xz" | awk '{print $1}')
          echo "sha_amd64=$AMD" >> "$GITHUB_OUTPUT"
          echo "sha_arm64=$ARM" >> "$GITHUB_OUTPUT"

          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/man/man1 deb/usr/share/doc/winetop
          tar -xJf "winetop-v${VER}-x86_64-unknown-linux-gnu.tar.xz" -C /tmp
          install -m 0755 /tmp/winetop deb/usr/bin/winetop
          install -m 0644 ../man/winetop.1 deb/usr/share/man/man1/winetop.1
          gzip -9n deb/usr/share/man/man1/winetop.1
          install -m 0644 ../README.md deb/usr/share/doc/winetop/README.md
          install -m 0644 ../LICENSE deb/usr/share/doc/winetop/copyright
          cat >deb/DEBIAN/control <<EOF
          Package: winetop
          Version: ${VER}-1
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Adam Kovari <adam@kovari.eu>
          Depends: libc6
          Homepage: https://github.com/akovari/winetop
          Description: htop for Wine prefixes
           Native CLI/TUI to monitor and stop Wine/Proton sessions.
          EOF
          sed -i 's/^          //' deb/DEBIAN/control
          dpkg-deb --build --root-owner-group deb "winetop_${VER}-1_amd64.deb"

          bash ../dist/ci/generate-installer.sh "$VER" winetop-installer.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: winetop ${{ needs.meta.outputs.version }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.xz
            release-assets/*.sha256
            release-assets/SHA256SUMS
            release-assets/*.deb
            release-assets/winetop-installer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates:
    needs: [meta, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p winetop-core --locked
          sleep 20
          cargo publish -p winetop --locked

  homebrew:
    needs: [meta, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
          path: winetop

      - name: Publish formula to tap
        env:
          TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
        run: |
          set -euo pipefail
          VER="${{ needs.meta.outputs.version }}"
          SHA_AMD64="${{ needs.release.outputs.sha_amd64 }}"
          SHA_ARM64="${{ needs.release.outputs.sha_arm64 }}"
          TAP_REPO="${TAP_REPO:-akovari/homebrew-tap}"

          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$TAP_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -t ed25519,rsa github.com >> "$HOME/.ssh/known_hosts"

          git clone "git@github.com:${TAP_REPO}.git" tap
          cd tap
          mkdir -p Formula
          bash ../winetop/dist/ci/generate-homebrew-formula.sh \
            "$VER" "$SHA_AMD64" "$SHA_ARM64" Formula/winetop.rb
          git config user.name "winetop-ci"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/winetop.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
          else
            git commit -m "winetop ${VER}"
            git push origin HEAD
          fi

  aur:
    needs: [meta, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Generate PKGBUILD
        run: bash dist/ci/generate-aur-pkgbuild.sh "${{ needs.meta.outputs.version }}" ./PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: winetop-bin
          pkgbuild: ./PKGBUILD
          updpkgsums: true
          commit_username: akovari
          commit_email: adam@kovari.eu
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  copr:
    needs: [meta, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Install copr-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-setuptools
          # Ubuntu does not package copr-cli; install from PyPI
          pip3 install --user 'copr-cli'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure & build on Copr
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
        run: |
          set -euo pipefail
          VER="${{ needs.meta.outputs.version }}"
          mkdir -p ~/.config
          {
            echo '[copr-cli]'
            echo "login = ${COPR_LOGIN}"
            echo "username = ${COPR_USERNAME}"
            echo "token = ${COPR_TOKEN}"
            echo 'copr_url = https://copr.fedorainfracloud.org'
          } > ~/.config/copr
          sed -i "s/^Version:.*/Version:        ${VER}/" dist/copr/winetop.spec
          PROJECT="${COPR_USERNAME}/winetop"
          echo "Building on Copr project ${PROJECT}"
          if ! copr-cli buildscm "$PROJECT" \
              --clone-url "https://github.com/akovari/winetop.git" \
              --commit "${{ needs.meta.outputs.tag }}" \
              --spec dist/copr/winetop.spec \
              --wait; then
            echo "buildscm failed; trying tarball URL build"
            copr-cli build "$PROJECT" \
              "https://github.com/akovari/winetop/archive/refs/tags/${{ needs.meta.outputs.tag }}.tar.gz"
          fi

  launchpad:
    needs: [meta, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts dput dpkg-dev \
            libssl-dev pkg-config

      - name: Import GPG key
        env:
          LAUNCHPAD_GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$LAUNCHPAD_GPG_PRIVATE_KEY" | gpg --batch --import
          FPR="${{ secrets.LAUNCHPAD_GPG_FINGERPRINT }}"
          echo "${FPR}:6:" | gpg --import-ownertrust
          gpg --list-secret-keys

      - name: Build source package and dput
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
          LAUNCHPAD_GPG_KEY_ID: ${{ secrets.LAUNCHPAD_GPG_KEY_ID }}
          DEBSIGN_KEYID: ${{ secrets.LAUNCHPAD_GPG_KEY_ID }}
        run: |
          chmod +x dist/ci/*.sh
          bash dist/ci/launchpad-upload.sh "${{ needs.meta.outputs.version }}"
